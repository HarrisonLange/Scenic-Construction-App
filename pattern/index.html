<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDSCPA — Pattern Lab</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%237AC143'/><stop offset='.33' stop-color='%23ED1C45'/><stop offset='.66' stop-color='%2392278F'/><stop offset='1' stop-color='%2300AEEF'/></linearGradient></defs><rect width='32' height='32' rx='7' fill='url(%23g)'/><text x='16' y='24' font-family='Arial,sans-serif' font-weight='900' font-size='21' fill='white' text-anchor='middle'>S</text></svg>">
<style>
  :root{
    --ui-dark:#0a0a0a; --ui-dark2:#1a1a1a; --ui-dark3:#333333;
    --accent:#3b82f6; --violet:#8b5cf6; --amber:#fbbf24; --pink:#EC008C; --green:#7AC143;
    --ok:#22c55e; --bad:#ef4444; --text-light:#f0f0f0; --text-dim:#888888;
    --mono:'SF Mono','Cascadia Mono','Consolas',ui-monospace,monospace;
    --rainbow:linear-gradient(90deg,#7AC143,#F7941E,#ED1C45,#EC008C,#92278F,#2E3192,#00AEEF);
    --stage:#15151a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--ui-dark);color:var(--text-light);display:flex;flex-direction:column}

  /* ── Topbar ── */
  #topbar{height:52px;flex:0 0 52px;display:flex;align-items:center;gap:8px;padding:0 14px;background:var(--ui-dark);border-bottom:1px solid #000;position:relative;z-index:30}
  #topbar::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--rainbow);opacity:.9}
  .brand{display:flex;flex-direction:column;justify-content:center;gap:2px;margin-right:6px;line-height:1}
  .brand-logo{height:22px;width:auto;display:block}
  .brand-tag{font-size:8.5px;font-weight:600;letter-spacing:1.6px;color:var(--text-dim);text-transform:uppercase;white-space:nowrap}
  .back{font-size:11px;color:var(--text-dim);text-decoration:none;border:1px solid var(--ui-dark3);border-radius:6px;padding:6px 9px;white-space:nowrap}
  .back:hover{color:#fff;border-color:var(--accent)}
  .spacer{flex:1}
  #curName{font-size:13px;font-weight:600;color:#dfe3ea;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:230px}
  #curName small{color:var(--text-dim);font-weight:400;font-family:var(--mono);font-size:11px}
  .tbtn{display:inline-flex;align-items:center;gap:6px;background:var(--ui-dark2);color:var(--text-light);border:1px solid var(--ui-dark3);border-radius:7px;padding:7px 11px;font-size:12.5px;cursor:pointer;font-family:inherit;white-space:nowrap}
  .tbtn:hover{border-color:var(--accent)}
  .tbtn.primary{background:var(--pink);border-color:var(--pink);color:#fff;font-weight:600}
  .tbtn.primary:hover{background:#ff3aa8}
  #btnAdvanced[aria-pressed="true"]{background:var(--violet);border-color:var(--violet);color:#fff;font-weight:600}
  .tbtn svg{display:block}
  .tbtn:disabled{opacity:.45;cursor:not-allowed}

  #main{flex:1;display:flex;min-height:0}

  /* ── Left: design picker ── */
  #picker{flex:0 0 300px;background:var(--ui-dark);border-right:1px solid var(--ui-dark3);display:flex;flex-direction:column;min-height:0}
  .pk-head{font-size:11px;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;padding:11px 13px 8px;display:flex;justify-content:space-between;align-items:center}
  .pk-head .count{color:var(--violet);font-family:var(--mono)}
  .pk-filters{display:flex;gap:7px;margin:0 11px 9px}
  #pkSearch{min-width:0;flex:1;background:var(--ui-dark2);border:1px solid var(--ui-dark3);border-radius:7px;color:var(--text-light);font-family:inherit;font-size:12.5px;padding:7px 9px;outline:none}
  #pkSearch:focus{border-color:var(--accent)}
  #pkDifficulty{width:112px;background:var(--ui-dark2);border:1px solid var(--ui-dark3);border-radius:7px;color:var(--text-light);font-family:inherit;font-size:11.5px;padding:7px 5px;outline:none}
  #pkDifficulty:focus{border-color:var(--accent)}
  #pkList{flex:1;overflow-y:auto;padding:0 10px 16px}
  .pk-group{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#c9cdd6;padding:14px 2px 7px;margin-bottom:2px}
  .pk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .pk-card{display:flex;flex-direction:column;background:var(--ui-dark2);border:1px solid var(--ui-dark3);border-radius:9px;cursor:pointer;overflow:hidden;transition:border-color .12s,transform .12s}
  .pk-card:hover{border-color:var(--pink);transform:translateY(-2px)}
  .pk-card.on{border-color:var(--pink);box-shadow:0 0 0 1px var(--pink)}
  .pk-thumb{height:96px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:5px}
  .pk-thumb.loading{color:#c8c8c8;font-size:15px}
  .pk-thumb svg{max-width:100%;max-height:100%;display:block}
  .pk-thumb svg path{vector-effect:non-scaling-stroke;stroke-width:0.9px!important}
  .pk-meta{padding:6px 8px 8px}
  .pk-name{font-size:11.5px;font-weight:600;color:#e9ecf2;line-height:1.2;margin-bottom:4px}
  .diff{display:inline-flex;gap:2px;flex:0 0 auto}
  .diff i{width:5px;height:5px;border-radius:50%;background:var(--ui-dark3)}
  .diff i.f{background:var(--amber)}

  /* ── Center: stage ── */
  #stageWrap{flex:1;position:relative;overflow:hidden;background:radial-gradient(900px 500px at 50% 0%, rgba(139,92,246,.10), transparent 70%),var(--stage);min-width:0}
  #svgHost{position:absolute;inset:0;overflow:hidden;cursor:grab}
  #svgHost.panning{cursor:grabbing}
  #svgPan{position:absolute;left:0;top:0;transform-origin:0 0;background:#fff;box-shadow:0 6px 40px rgba(0,0,0,.5);border-radius:2px}
  #svgPan svg{display:block}
  #stageMsg{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text-dim);font-size:13.5px;text-align:center;padding:30px;pointer-events:none}
  #stageMsg.show{display:flex}
  #stageMsg b{color:var(--text-light)}
  #stageMsg .missing{color:var(--amber);font-family:var(--mono);font-size:12px;line-height:1.7}
  #zoomBar{position:absolute;right:12px;bottom:12px;display:flex;gap:6px;z-index:6}
  #zoomBar button{width:32px;height:32px;border-radius:7px;background:rgba(20,20,24,.9);border:1px solid var(--ui-dark3);color:var(--text-light);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  #zoomBar button:hover{border-color:var(--accent)}
  #panHint{position:absolute;left:12px;bottom:12px;color:var(--text-dim);font-size:10.5px;font-family:var(--mono);pointer-events:none;opacity:.7}
  #sizeTag{position:absolute;left:12px;top:12px;color:var(--text-dim);font-size:10.5px;font-family:var(--mono);background:rgba(10,10,10,.6);border:1px solid var(--ui-dark3);border-radius:6px;padding:4px 8px;pointer-events:none}

  /* ── Right: panel ── */
  #panel{flex:0 0 340px;background:var(--ui-dark);border-left:1px solid var(--ui-dark3);display:flex;flex-direction:column;min-height:0}
  #tabs{display:flex;border-bottom:1px solid var(--ui-dark3);flex:0 0 auto}
  .tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-dim);font-family:inherit;font-size:12.5px;font-weight:600;padding:12px 4px;cursor:pointer}
  .tab:hover{color:#fff}
  .tab.on{color:#fff;border-bottom-color:var(--pink)}
  .tab .b{display:inline-block;min-width:16px;font-size:10px;color:var(--violet);font-family:var(--mono)}
  .tabpage{display:none;flex:1;overflow-y:auto;padding:14px 15px 26px}
  .tabpage.on{display:block}

  .fieldset-title{font-size:10.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#c9cdd6;margin:2px 0 10px;display:flex;align-items:center;gap:8px}
  .fieldset-title::after{content:"";flex:1;height:1px;background:var(--ui-dark3)}
  .fieldset-title.click{cursor:pointer}
  .fieldset-title .chev{color:var(--text-dim);font-size:10px}

  .row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .row label{flex:1;font-size:12px;color:#cfd3db;display:flex;align-items:center;gap:5px}
  .row .info{padding:0;background:transparent;color:var(--text-dim);cursor:help;font:700 9px/1 inherit;border:1px solid var(--ui-dark3);border-radius:50%;width:15px;height:15px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
  .row .info:hover,.row .info:focus,.row .info[aria-expanded="true"]{color:var(--accent);border-color:var(--accent);outline:none}
  #helpPopover{position:fixed;z-index:120;max-width:280px;background:#24242a;color:#f1f3f7;border:1px solid #4b5563;border-radius:8px;padding:9px 11px;font-size:11.5px;line-height:1.45;box-shadow:0 8px 28px rgba(0,0,0,.55);pointer-events:none}
  #helpPopover[hidden]{display:none}
  .num{width:78px;background:var(--ui-dark);color:var(--text-light);border:1px solid var(--ui-dark3);border-radius:6px;padding:6px 7px;font-size:12.5px;font-family:var(--mono);text-align:right;outline:none}
  .num:focus{border-color:var(--pink)}
  .num.opt{background:#0d0d10}
  .unit{font-size:10.5px;color:var(--text-dim);font-family:var(--mono);width:22px}

  .seg{display:inline-flex;border:1px solid var(--ui-dark3);border-radius:7px;overflow:hidden}
  .seg button{background:var(--ui-dark2);border:none;color:var(--text-dim);font-family:inherit;font-size:11.5px;padding:5px 10px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff;font-weight:600}
  select.sel,.wide{width:100%;background:var(--ui-dark);color:var(--text-light);border:1px solid var(--ui-dark3);border-radius:7px;padding:7px 8px;font-size:12.5px;font-family:inherit;outline:none}
  select.sel:focus{border-color:var(--accent)}

  .settings-box{background:#101014;border:1px solid var(--ui-dark3);border-radius:10px;padding:11px 12px;margin-bottom:16px}
  .settings-box .row:last-child{margin-bottom:0}

  /* option widgets */
  .opt{margin-bottom:14px}
  .opt .ohead{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:5px}
  .opt .oname{font-size:12px;color:#dfe3ea;font-weight:600}
  .opt .oval{font-size:11px;color:var(--pink);font-family:var(--mono)}
  .opt .oval.def{color:var(--text-dim)}
  .opt input[type=range]{width:100%;accent-color:var(--pink);cursor:pointer}
  .opt .odesc{font-size:10.5px;color:var(--text-dim);line-height:1.4;margin-top:3px}
  .opt.bool .ohead{margin-bottom:0}
  .switch{position:relative;width:38px;height:21px;flex:0 0 auto}
  .switch input{opacity:0;width:0;height:0}
  .switch .sl{position:absolute;inset:0;background:var(--ui-dark3);border-radius:999px;transition:.15s}
  .switch .sl::before{content:"";position:absolute;width:15px;height:15px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
  .switch input:checked+.sl{background:var(--pink)}
  .switch input:checked+.sl::before{transform:translateX(17px)}
  .oreset{background:none;border:none;color:var(--text-dim);font-size:10px;cursor:pointer;font-family:inherit;text-decoration:underline;padding:0}
  .oreset:hover{color:#fff}
  .grp-reset{float:right;font-weight:400;text-transform:none;letter-spacing:0}

  /* guide/instructions */
  .guide-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .guide-illustration{position:relative;display:flex;align-items:center;justify-content:center;min-height:190px;margin:12px 0 10px;padding:12px;background:radial-gradient(circle at 50% 35%,#292932,#151519 72%);border:1px solid var(--ui-dark3);border-radius:10px;overflow:hidden}
  .guide-illustration img{display:block;width:100%;height:230px;object-fit:contain}
  .guide-illustration figcaption{position:absolute;left:8px;bottom:7px;padding:2px 6px;border-radius:4px;background:rgba(10,10,10,.72);color:var(--text-dim);font-size:9.5px;letter-spacing:.4px;text-transform:uppercase}
  .chip{font-size:10px;background:var(--ui-dark2);border:1px solid var(--ui-dark3);border-radius:999px;padding:3px 9px;color:#b9bdc7}
  .chip.diff{color:var(--amber);gap:3px}
  .md h2{font-size:14px;color:#e9ecf2;margin:16px 0 6px;font-weight:700}
  .md h3{font-size:12.5px;color:#dfe3ea;margin:12px 0 5px;font-weight:700}
  .md p{font-size:12px;line-height:1.6;color:#c2c6cf;margin:0 0 9px}
  .md ul{margin:0 0 10px;padding-left:18px}
  .md li{font-size:12px;line-height:1.55;color:#c2c6cf;margin-bottom:4px}
  .md strong{color:#e9ecf2}
  .md em{color:#cdd2db;font-style:italic}
  .md blockquote{border-left:2px solid var(--violet);background:#12121a;margin:0 0 10px;padding:7px 11px;font-size:11.5px;color:#b6bac4;border-radius:0 6px 6px 0}
  .md code{font-family:var(--mono);font-size:11px;background:#0d0d12;border:1px solid var(--ui-dark3);border-radius:4px;padding:0 4px}

  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:130;display:none;background:rgba(28,28,30,.96);color:var(--text-light);border:1px solid var(--ui-dark3);border-radius:8px;padding:9px 14px;font-size:12.5px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  #toast.show{display:block}
  #toast.warn{border-color:var(--amber);color:var(--amber)}

  @media (max-width:900px){
    #picker{flex-basis:200px} #panel{flex-basis:290px}
    .pk-filters{flex-direction:column} #pkDifficulty{width:100%}
  }
</style>
</head>
<body>

<div id="topbar">
  <a class="back" href="../" title="Back to all labs">‹ Labs</a>
  <div class="brand">
    <svg class="brand-logo" viewBox="0 0 196 50" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SDSCPA">
      <defs><linearGradient id="sdscpaGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#7AC143"/><stop offset=".17" stop-color="#F7941E"/><stop offset=".34" stop-color="#ED1C45"/><stop offset=".50" stop-color="#EC008C"/><stop offset=".66" stop-color="#92278F"/><stop offset=".83" stop-color="#2E3192"/><stop offset="1" stop-color="#00AEEF"/>
      </linearGradient></defs>
      <text x="0" y="40" font-family="'Arial Black','Arial Narrow Bold',Arial,sans-serif" font-weight="900" font-size="46" letter-spacing="-1.5" fill="url(#sdscpaGrad)">SDSCPA</text>
    </svg>
    <div class="brand-tag">Pattern Lab</div>
  </div>
  <div id="curName">—</div>
  <div class="spacer"></div>
  <button class="tbtn" id="btnAdvanced" title="Show design options to fine-tune the fit">⚙ Advanced mode</button>
  <button class="tbtn" id="btnShare" title="Copy a link that reopens this exact pattern + measurements">🔗 Share</button>
  <button class="tbtn" id="btnRoll" title="Print full-size on a 36-inch roll / plotter">🖨 36″ roll</button>
  <button class="tbtn" id="btnTiles" title="Print on tape-together US Letter pages">🖨 Letter tiles</button>
</div>

<div id="main">
  <!-- Left: design picker -->
  <aside id="picker">
    <div class="pk-head">Patterns <span class="count" id="pkCount">0</span></div>
    <div class="pk-filters">
      <input id="pkSearch" type="search" placeholder="Search patterns…" aria-label="Search patterns" autocomplete="off">
      <select id="pkDifficulty" aria-label="Filter patterns by difficulty">
        <option value="0">All levels</option>
        <option value="1">Level 1</option>
        <option value="2">Level 2</option>
        <option value="3">Level 3</option>
        <option value="4">Level 4</option>
        <option value="5">Level 5</option>
      </select>
    </div>
    <div id="pkList"></div>
  </aside>

  <!-- Center: live draft -->
  <div id="stageWrap">
    <div id="svgHost"><div id="svgPan"></div></div>
    <div id="sizeTag"></div>
    <div id="stageMsg"></div>
    <div id="panHint">scroll = zoom · drag = pan</div>
    <div id="zoomBar">
      <button id="zIn" title="Zoom in">+</button>
      <button id="zOut" title="Zoom out">−</button>
      <button id="zFit" title="Fit to screen">⊡</button>
    </div>
  </div>

  <!-- Right: tabs -->
  <aside id="panel">
    <div id="tabs">
      <button class="tab on" data-tab="meas">Measurements <span class="b" id="measBadge"></span></button>
      <button class="tab" id="tabOpts" data-tab="opts" hidden>Options <span class="b" id="optBadge"></span></button>
      <button class="tab" data-tab="guide">Guide</button>
    </div>
    <div class="tabpage on" id="page-meas"></div>
    <div class="tabpage" id="page-opts"></div>
    <div class="tabpage" id="page-guide"></div>
  </aside>
</div>

<div id="toast"></div>
<div id="helpPopover" role="tooltip" hidden></div>

<!-- Shared learning helpers + bundled FreeSewing engine + extracted prose -->
<script src="../shared/learn.js"></script>
<script src="freesewing.bundle.js"></script>
<script src="patterns-data.js"></script>
<script>
"use strict";
/* ═══════════════════════════════════════════════════════════════════════════
   SDSCPA Pattern Lab — a made-to-measure sewing-pattern trainer.
   Drafting is powered by FreeSewing's real engine (freesewing.bundle.js, MIT);
   this file is the SDSCPA-branded UI: pick a design, enter body measurements,
   tweak design options, and print the resulting pattern at true 1:1 scale.
   ═══════════════════════════════════════════════════════════════════════════ */

const MM_PER_IN = 25.4;
const PX_PER_MM = 96 / 25.4;          // CSS px per mm at 96dpi (screen only)
const ROLL_W_MM = 36 * MM_PER_IN;     // 914.4 — the 36" roll width
const LETTER_W = 215.9, LETTER_H = 279.4;   // US Letter, mm

const DESIGNS = FS.designs;
const ABOUT = FS.about;
const MEAS_LABELS = FS.strings.measurements;      // {chest:"Chest circumference",…}
const GROUP_LABELS = FS.strings.optiongroups;     // {fit:"Fit", style:"Style",…}
const DATA = window.PATTERN_DATA || { instructions:{}, measureHelp:{} };

/* Category display order + friendly names (keyed off each design's tags). */
const CAT_ORDER = ['tops','dresses','trousers','bottoms','skirts','coats','overalls',
  'underwear','swimwear','pajamas','hats','accessories','bags','blocks','historical',
  'costumes','infants','onePiece','toys'];
const CAT_NAME = {tops:'Tops',dresses:'Dresses',trousers:'Trousers & Pants',
  bottoms:'Shorts & Bottoms',skirts:'Skirts',coats:'Coats & Jackets',overalls:'Overalls',
  underwear:'Underwear',swimwear:'Swimwear',pajamas:'Pajamas & Loungewear',hats:'Hats',
  accessories:'Accessories',bags:'Bags',blocks:'Blocks (slopers)',historical:'Historical',
  costumes:'Costumes',infants:'Infants',onePiece:'One-piece',toys:'Toys & Plush'};

/* ── App state (persisted) ── */
const LS_MEAS = 'sdscpa-pattern-measurements';
const LS_STATE = 'sdscpa-pattern-v1';
const state = {
  design: 'teagan',
  units: 'imperial',                 // display units: 'imperial' | 'metric'
  sampleSize: 'cisFemaleAdult36',
  measurements: {},                  // mm, shared across designs
  options: {},                       // {designName:{optKey:value}}  (overrides only)
  sa: true,
  saMM: 9.525,                       // 3/8"
  advanced: false,                   // reveals the Options tab
  diffFilter: 0,                     // picker difficulty filter (0 = all)
};

/* ── DOM refs ── */
const $ = (id) => document.getElementById(id);
const svgHost = $('svgHost'), svgPan = $('svgPan'), stageMsg = $('stageMsg'), sizeTag = $('sizeTag');
let curSVG = null, curW = 0, curH = 0;        // last good render (mm)
let view = { z: 1, x: 0, y: 0 };

/* ═════════════ helpers ═════════════ */
function prettify(k){ return k.replace(/([A-Z])/g,' $1').replace(/^./,c=>c.toUpperCase()).trim(); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg, warn){
  const t=$('toast'); t.textContent=msg; t.className='show'+(warn?' warn':'');
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.className='',2600);
}
function mmToDisplay(mm){ return state.units==='imperial' ? mm/MM_PER_IN : mm/10; }
function displayToMM(v){ return state.units==='imperial' ? v*MM_PER_IN : v*10; }
function unitLabel(){ return state.units==='imperial' ? 'in' : 'cm'; }
function fmt(n){ return (Math.round(n*100)/100).toString(); }

function saveState(){
  try{
    localStorage.setItem(LS_MEAS, JSON.stringify({m:state.measurements, units:state.units, size:state.sampleSize}));
    localStorage.setItem(LS_STATE, JSON.stringify({design:state.design, options:state.options, sa:state.sa, saMM:state.saMM}));
  }catch(e){}
}
function loadState(){
  try{
    const m=JSON.parse(localStorage.getItem(LS_MEAS)||'null');
    if(m){ state.measurements=m.m||{}; state.units=m.units||'imperial'; state.sampleSize=m.size||state.sampleSize; }
    const s=JSON.parse(localStorage.getItem(LS_STATE)||'null');
    if(s){ state.design=s.design||state.design; state.options=s.options||{}; state.sa=s.sa!==false; state.saMM=s.saMM||state.saMM; }
  }catch(e){}
}

/* Encode/decode the full setup in the URL hash (Share; no account needed). */
function encodeShare(){
  const payload={d:state.design,u:state.units,m:state.measurements,o:state.options[state.design]||{},sa:state.sa,sv:state.saMM};
  return btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
}
function tryLoadShare(){
  if(!location.hash || location.hash.length<4) return false;
  try{
    const p=JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(1)))));
    if(p.d && DESIGNS[p.d]){
      state.design=p.d; state.units=p.u||state.units; state.measurements=p.m||state.measurements;
      state.options[p.d]=p.o||{}; state.sa=p.sa!==false; state.saMM=p.sv||state.saMM;
      return true;
    }
  }catch(e){}
  return false;
}

/* ═════════════ pattern config introspection ═════════════ */
let configCache = {};
function getConfig(name){
  if(configCache[name]) return configCache[name];
  let cfg;
  try{ cfg = new DESIGNS[name]({measurements: state.measurements}).getConfig(); }
  catch(e){ cfg = {measurements:FS.requiredMeasurements[name]||[], optionalMeasurements:FS.optionalMeasurements[name]||[], options:{}}; }
  configCache[name]=cfg; return cfg;
}
/* Which options are user-facing widgets (skip resolved constants). */
function optionKind(v){
  if(!v || typeof v!=='object') return null;
  if('pct' in v) return 'pct';
  if('bool' in v) return 'bool';
  if('deg' in v) return 'deg';
  if('count' in v) return 'count';
  if(Array.isArray(v.list)) return 'list';
  return null;
}
/* Resolve an option's group; menu may be a string or a conditional function. */
function optionGroup(v){
  let m = v.menu;
  if(typeof m==='function'){
    try{ m = m({measurements:state.measurements, options:curOptions()}, curOptions()); }
    catch(e){ m = 'advanced'; }
  }
  if(m===false || m==null) return null;      // hidden in this configuration
  m = String(m);
  return m.indexOf('.')>=0 ? m.split('.')[0] : m;
}
function optLabel(name, key){
  const o = (FS.i18n[name] && FS.i18n[name].en && FS.i18n[name].en.o) || {};
  const e = o[key];
  if(e && typeof e==='object' && e.t) return {t:e.t, d:e.d||''};
  if(typeof e==='string') return {t:e, d:''};
  return {t:prettify(key), d:''};
}

/* ═════════════ drafting ═════════════ */
function curOptions(){
  const overrides=state.options[state.design]||{};
  const cfg=getConfig(state.design);
  // Some guides refer to lettered matching seams. Designs that provide a
  // helpText option should show those letters unless the user explicitly opts out.
  const defaults=(cfg.options && cfg.options.helpText && overrides.helpText===undefined) ? {helpText:true} : {};
  return Object.assign(defaults,overrides);
}

function settingsForDraft(extra){
  // Construction labels, grainlines, cut counts, notches, and seam references
  // are part of the plan, so the main draft is always rendered complete.
  const s = { measurements: state.measurements, options: curOptions(), units: state.units, complete: true };
  if(state.sa) s.sa = state.saMM;
  return Object.assign(s, extra||{});
}
function missingMeasurements(name){
  const req = FS.requiredMeasurements[name] || getConfig(name).measurements || [];
  return req.filter(k => !(state.measurements[k] > 0));
}
/* Draft + render → SVG string (mm), or throw.
   The theme plugin injects FreeSewing's default stylesheet (class="freesewing"
   + scoped CSS) so pieces render as proper outlines instead of solid-black fills. */
function renderSVG(extra){
  return renderDesign(state.design, settingsForDraft(extra));
}
/* Low-level: draft any design with given settings → sanitized SVG string. */
function renderDesign(name, settings){
  const p = new DESIGNS[name](settings);
  if(FS.themePlugin) p.use(FS.themePlugin);
  p.draft();
  return sanitizeSVGString(p.render(),name);
}
/* Translate construction annotations, then strip branding only. Pattern names,
   part names, cut instructions, grainlines, calibration text, and lettered seam
   references must remain visible because the sewing guides rely on them. */
const _scratch = document.createElement('div');
const ANNOTATION_TEXT = {
  cut:'Cut', cutOnFold:'Cut on fold', cutOnFoldAndGrainline:'Cut on fold · Grainline',
  from:'from', grainline:'Grainline', mirrored:'mirrored', onBias:'on bias', onFold:'on fold',
  onFoldAndBias:'on fold and bias', sewTogether:'Sew together', fabric:'fabric', lining:'lining',
  interfacing:'interfacing', canvas:'canvas', various:'other material', ribbing:'ribbing',
  theWhiteInsideOfThisBoxShouldMeasure:'The white inside of this box should measure',
  theBlackOutsideOfThisBoxShouldMeasure:'The black outside of this box should measure',
  noName:'', noVersion:'', supportFreeSewingBecomeAPatron:''
};
function replaceAllText(value,needle,replacement){ return value.split(needle).join(replacement); }
function translateSvgText(value,name){
  let out=String(value||'');
  // Cut-list text encodes its count, qualifiers, and material as comma-separated
  // translation tokens. Convert the whole sequence into a readable instruction.
  out=out.replace(/plugin-annotations:cut,(\d+),((?:plugin-annotations:[A-Za-z]+,)*)plugin-annotations:from,plugin-annotations:([A-Za-z]+),/g,
    (_,count,rawQualifiers,material)=>{
      const qualifiers=[...rawQualifiers.matchAll(/plugin-annotations:([A-Za-z]+)/g)]
        .map(match=>ANNOTATION_TEXT[match[1]]||prettify(match[1]));
      return 'Cut '+count+(qualifiers.length?' '+qualifiers.join(' '):'')+' from '+(ANNOTATION_TEXT[material]||prettify(material).toLowerCase());
    });
  Object.entries(ANNOTATION_TEXT).sort((a,b)=>b[0].length-a[0].length).forEach(([key,label])=>{
    out=replaceAllText(out,'plugin-annotations:'+key,label);
  });
  const en=FS.i18n[name] && FS.i18n[name].en;
  Object.entries((en&&en.s)||{}).forEach(([key,label])=>{
    if(typeof label==='string') out=replaceAllText(out,name+':'+key,label);
  });
  const trimmed=out.trim();
  if(en && en.p && typeof en.p[trimmed]==='string') out=out.replace(trimmed,en.p[trimmed]);
  // Preserve unknown annotations as readable fallback text instead of deleting them.
  out=out.replace(/\b(?:plugin-[\w-]+|[a-z][\w-]*):([A-Za-z][\w.-]*)/g,
    (_,key)=>prettify(key.replace(/[-_.]+/g,' ')));
  // Remove only branding/version fragments. Keep any useful text sharing a line
  // with them, such as the design name.
  return out
    .replace(/https?:\/\/\S*free ?sewing\S*/gi,'')
    .replace(/free ?sewing\.(org|eu|dev)\/\S*/gi,'')
    .replace(/\bfree ?sewing\b/gi,'')
    .replace(/\bv\d+\.\d+\.\d+\b/gi,'')
    .replace(/\(\s*ephemeral\s*\)/gi,'');
}
function sanitizeSVG(el,name){
  el.removeAttribute('freesewing');
  el.removeAttribute('xmlns:freesewing');
  el.querySelectorAll('#logo').forEach(e=>e.remove());
  el.querySelectorAll('use').forEach(u=>{ const h=u.getAttribute('xlink:href')||u.getAttribute('href'); if(h==='#logo') u.remove(); });
  el.querySelectorAll('[data-text]').forEach(node=>node.setAttribute('data-text',translateSvgText(node.getAttribute('data-text'),name)));
  el.querySelectorAll('text').forEach(t=>{
    const walker=document.createTreeWalker(t,NodeFilter.SHOW_TEXT);
    const nodes=[]; while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(node=>{ node.nodeValue=translateSvgText(node.nodeValue,name); });
    if(!(t.textContent||'').trim()) t.remove();
  });
  // Neutralise the brand token in the CSS hook (class + scoped selectors) so no
  // "freesewing" string is left in the page/print source — keep styling intact.
  const cls=el.getAttribute('class'); if(cls) el.setAttribute('class', cls.replace(/freesewing/g,'patlab'));
  el.querySelectorAll('style').forEach(s=>{ s.textContent = s.textContent.replace(/svg\.freesewing/g,'svg.patlab'); });
}
function sanitizeSVGString(raw,name){
  _scratch.innerHTML = stripXml(raw);
  const el = _scratch.querySelector('svg');
  let out = raw;
  if(el){ sanitizeSVG(el,name); out = el.outerHTML; }
  _scratch.innerHTML='';
  return out;
}
function parseDims(svg){
  const w = svg.match(/width="([\d.]+)mm"/), h = svg.match(/height="([\d.]+)mm"/);
  const vb = svg.match(/viewBox="([-\d.]+) ([-\d.]+) ([\d.]+) ([\d.]+)"/);
  let W = w?parseFloat(w[1]):(vb?parseFloat(vb[3]):0);
  let H = h?parseFloat(h[1]):(vb?parseFloat(vb[4]):0);
  return {W,H};
}
function stripXml(svg){ const i=svg.indexOf('<svg'); return i>=0?svg.slice(i):svg; }

function draft(){
  const miss = missingMeasurements(state.design);
  if(miss.length){
    showMsg('<b>Almost there.</b><div style="margin-top:6px">Enter these measurements to draft <b>'+esc(ABOUT[state.design].name)+'</b>:</div>'+
      '<div class="missing" style="margin-top:8px">'+miss.map(m=>'• '+esc(MEAS_LABELS[m]||prettify(m))).join('<br>')+'</div>');
    curSVG=null; return;
  }
  let svg;
  try{ svg = renderSVG(); }
  catch(e){
    console.warn('draft error', state.design, e);
    showMsg('<b>This pattern couldn\'t be drafted with the current numbers.</b><div style="margin-top:6px;font-size:12px">Try a different sample size or adjust a measurement.</div><div class="missing" style="margin-top:8px;font-size:11px">'+esc(String(e.message||e).split('\n')[0])+'</div>');
    curSVG=null; return;
  }
  const {W,H}=parseDims(svg);
  curSVG=svg; curW=W; curH=H;
  hideMsg();
  svgPan.innerHTML = stripXml(svg);
  const el = svgPan.querySelector('svg');
  if(el){ el.removeAttribute('width'); el.removeAttribute('height');
    el.style.width=(W*PX_PER_MM)+'px'; el.style.height=(H*PX_PER_MM)+'px'; el.style.display='block'; }
  svgPan.style.width=(W*PX_PER_MM)+'px'; svgPan.style.height=(H*PX_PER_MM)+'px';
  sizeTag.textContent = 'Pattern ≈ '+fmt(W/MM_PER_IN)+'″ × '+fmt(H/MM_PER_IN)+'″   ('+Math.round(W)+' × '+Math.round(H)+' mm)';
  applyView();
}
function showMsg(html){ stageMsg.innerHTML=html; stageMsg.classList.add('show'); svgPan.innerHTML=''; sizeTag.textContent=''; }
function hideMsg(){ stageMsg.classList.remove('show'); }

/* ═════════════ zoom / pan ═════════════ */
function fitView(){
  if(!curW){ return; }
  const hw=svgHost.clientWidth, hh=svgHost.clientHeight;
  const pw=curW*PX_PER_MM, ph=curH*PX_PER_MM;
  const z=Math.min(hw/pw, hh/ph)*0.92;
  view.z=z; view.x=(hw-pw*z)/2; view.y=(hh-ph*z)/2; applyView();
}
function applyView(){ svgPan.style.transform='translate('+view.x+'px,'+view.y+'px) scale('+view.z+')'; }
svgHost.addEventListener('wheel',(e)=>{
  e.preventDefault();
  const r=svgHost.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  const f=e.deltaY<0?1.12:1/1.12, nz=Math.max(0.05,Math.min(12,view.z*f));
  view.x=mx-(mx-view.x)*(nz/view.z); view.y=my-(my-view.y)*(nz/view.z); view.z=nz; applyView();
},{passive:false});
let drag=null;
svgHost.addEventListener('pointerdown',(e)=>{ drag={x:e.clientX,y:e.clientY,vx:view.x,vy:view.y}; svgHost.classList.add('panning'); svgHost.setPointerCapture(e.pointerId); });
svgHost.addEventListener('pointermove',(e)=>{ if(!drag)return; view.x=drag.vx+(e.clientX-drag.x); view.y=drag.vy+(e.clientY-drag.y); applyView(); });
svgHost.addEventListener('pointerup',()=>{ drag=null; svgHost.classList.remove('panning'); });
$('zIn').onclick=()=>{ view.z=Math.min(12,view.z*1.2); applyView(); };
$('zOut').onclick=()=>{ view.z=Math.max(0.05,view.z/1.2); applyView(); };
$('zFit').onclick=fitView;

/* ═════════════ design picker ═════════════ */
function designCategory(name){
  const tags = (ABOUT[name].tags)||[];
  for(const c of CAT_ORDER) if(tags.includes(c)) return c;
  return tags[0] || 'other';
}
/* Thumbnails = the design's own pattern, drafted clean (complete:false) → a real
   line drawing, rendered lazily as cards scroll into view and cached by name. */
const thumbCache={};
/* Non-blocking render queue: draft each thumbnail one per tick so the UI stays
   responsive, and cache the result. (More robust than IntersectionObserver,
   which doesn't fire when the tab isn't actually painted.) */
let thumbQueue=[], thumbRunning=false;
function queueThumb(box){ thumbQueue.push(box); if(!thumbRunning){ thumbRunning=true; setTimeout(runThumbs,0); } }
function runThumbs(){
  const t0=performance.now();
  // Render a batch within a time budget, then yield — fast even when the tab's
  // timers are throttled (each render is only a few ms).
  while(thumbQueue.length && performance.now()-t0<140){
    const box=thumbQueue.shift();
    if(box.isConnected && box.classList.contains('loading')){
      const svg=renderThumb(box.dataset.name);
      box.classList.remove('loading');
      box.innerHTML = svg || '<span style="color:#bbb;font-size:10px">—</span>';
    }
  }
  if(thumbQueue.length) setTimeout(runThumbs,0);
  else thumbRunning=false;
}
function thumbMeasurements(name){
  const req=FS.requiredMeasurements[name]||[];
  const ok=req.length && req.every(k=>state.measurements[k]>0);
  return ok? state.measurements : (FS.models[state.sampleSize]||FS.models.cisFemaleAdult36);
}
function renderThumb(name){
  if(thumbCache[name]!==undefined) return thumbCache[name];
  let svg='';
  try{
    const p=new DESIGNS[name]({measurements:thumbMeasurements(name), complete:false});
    if(FS.themePlugin) p.use(FS.themePlugin);
    p.draft();
    _scratch.innerHTML=stripXml(p.render());        // single parse: sanitize + fit in one pass
    const el=_scratch.querySelector('svg');
    if(el){ sanitizeSVG(el,name); el.removeAttribute('width'); el.removeAttribute('height');
      el.setAttribute('preserveAspectRatio','xMidYMid meet'); svg=el.outerHTML; }
    _scratch.innerHTML='';
  }catch(e){ svg=''; }
  thumbCache[name]=svg; return svg;
}
function buildPicker(filter){
  const list=$('pkList'); list.innerHTML=''; thumbQueue.length=0; thumbRunning=false;
  const q=(filter===undefined ? $('pkSearch').value : filter||'').trim().toLowerCase();
  const difficulty=Number(state.diffFilter)||0;
  const names=Object.keys(DESIGNS).filter(n=>n!=='library').sort((a,b)=>ABOUT[a].name.localeCompare(ABOUT[b].name));
  const byCat={};
  names.forEach(n=>{
    const a=ABOUT[n];
    const hay=(a.name+' '+scrubBrand(a.description)+' '+(a.tags||[]).join(' ')).toLowerCase();
    if(q && hay.indexOf(q)<0) return;
    if(difficulty && Number(a.difficulty)!==difficulty) return;
    const c=designCategory(n); (byCat[c]=byCat[c]||[]).push(n);
  });
  const cats=Object.keys(byCat).sort((a,b)=>{
    const ia=CAT_ORDER.indexOf(a), ib=CAT_ORDER.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib);
  });
  let shown=0;
  cats.forEach(c=>{
    const g=document.createElement('div'); g.className='pk-group'; g.textContent=CAT_NAME[c]||prettify(c); list.appendChild(g);
    const grid=document.createElement('div'); grid.className='pk-grid';
    byCat[c].forEach(n=>{
      shown++;
      const a=ABOUT[n];
      const card=document.createElement('div'); card.className='pk-card'+(n===state.design?' on':''); card.dataset.name=n; card.title=scrubBrand(a.description);
      let dots=''; for(let i=1;i<=5;i++) dots+='<i class="'+(i<=(a.difficulty||0)?'f':'')+'"></i>';
      card.innerHTML='<div class="pk-thumb loading" data-name="'+n+'">…</div>'+
        '<div class="pk-meta"><div class="pk-name">'+esc(a.name)+'</div><span class="diff">'+dots+'</span></div>';
      card.onclick=()=>selectDesign(n);
      grid.appendChild(card);
      queueThumb(card.querySelector('.pk-thumb'));
    });
    list.appendChild(grid);
  });
  $('pkCount').textContent=shown;
  if(!shown){ list.innerHTML='<div style="padding:20px;color:var(--text-dim);font-size:12px;text-align:center">No patterns match the current search and difficulty filters.</div>'; }
}
function selectDesign(name){
  state.design=name;
  document.querySelectorAll('.pk-card').forEach(el=>el.classList.toggle('on',el.dataset.name===name));
  $('curName').innerHTML=esc(ABOUT[name].name)+' <small>'+esc(name)+'</small>';
  buildOptions(); buildGuide(); buildMeas();
  draft(); fitView(); saveState();
}

/* ═════════════ measurements tab ═════════════ */
function sampleSizeOptions(){
  const keys=Object.keys(FS.models).filter(k=>/^cis(Female|Male)Adult\d+$/.test(k));
  const fem=keys.filter(k=>k.indexOf('Female')>=0), mal=keys.filter(k=>k.indexOf('Male')>=0&&k.indexOf('Female')<0);
  const opt=(k)=>{ const n=k.match(/(\d+)$/)[1]; const who=k.indexOf('Female')>=0?"Women's":"Men's"; return '<option value="'+k+'"'+(k===state.sampleSize?' selected':'')+'>'+who+' size '+n+'</option>'; };
  return '<optgroup label="Women\'s sizes">'+fem.map(opt).join('')+'</optgroup>'+
         '<optgroup label="Men\'s sizes">'+mal.map(opt).join('')+'</optgroup>';
}
function buildMeas(){
  closeMeasurementHelp();
  const cfg=getConfig(state.design);
  const req=cfg.measurements||[], opt=cfg.optionalMeasurements||[];
  const p=$('page-meas');
  let html='';
  // Core settings
  html+='<div class="settings-box">';
  html+='<div class="row"><label>Sample body</label><select class="sel" id="mSample" style="flex:1.4">'+sampleSizeOptions()+'</select></div>';
  html+='<div class="row"><label>Units</label><div class="seg" id="mUnits"><button data-u="imperial" class="'+(state.units==='imperial'?'on':'')+'">Inches</button><button data-u="metric" class="'+(state.units==='metric'?'on':'')+'">cm</button></div></div>';
  html+='<div class="row"><label>Seam allowance</label><label class="switch" style="flex:0 0 auto"><input type="checkbox" id="mSa"'+(state.sa?' checked':'')+'><span class="sl"></span></label>'+
        '<input class="num" id="mSaV" type="number" step="0.125" value="'+fmt(mmToDisplay(state.saMM))+'"'+(state.sa?'':' disabled')+'><span class="unit">'+unitLabel()+'</span></div>';
  html+='</div>';
  // Required measurements
  html+='<div class="fieldset-title">Measurements for this pattern</div>';
  html+='<div style="font-size:11px;color:var(--text-dim);margin:-4px 0 12px;line-height:1.5">Pick a sample body above to try it fast, or type a real person\'s numbers. They\'re saved and reused for every pattern.</div>';
  req.forEach(k=>{ html+=measRow(k,false); });
  if(opt.length){
    html+='<div class="fieldset-title">Optional measurements</div>';
    opt.forEach(k=>{ html+=measRow(k,true); });
  }
  p.innerHTML=html;
  // wire
  $('mSample').onchange=(e)=>{
    const sample=FS.models[e.target.value];
    if(!sample){ toast('That sample body could not be loaded.', true); return; }
    state.sampleSize=e.target.value;
    state.measurements=Object.fromEntries(Object.entries(sample).map(([key,value])=>[key,Number(value)]));
    configCache={};
    buildMeas(); buildOptions(); draft(); fitView(); saveState();
    toast('Loaded sample: '+e.target.selectedOptions[0].textContent);
  };
  $('mUnits').querySelectorAll('button').forEach(b=>b.onclick=()=>{ state.units=b.dataset.u; buildMeas(); draft(); saveState(); });
  $('mSa').onchange=(e)=>{ state.sa=e.target.checked; buildMeas(); draft(); saveState(); };
  $('mSaV').oninput=(e)=>{ const v=parseFloat(e.target.value); if(v>=0){ state.saMM=displayToMM(v); draft(); saveState(); } };
  p.querySelectorAll('input[data-meas]').forEach(inp=>{
    inp.oninput=()=>{ const v=parseFloat(inp.value); const k=inp.dataset.meas;
      if(inp.value===''||isNaN(v)){ delete state.measurements[k]; } else { state.measurements[k]=displayToMM(v); }
      draft(); saveState(); updateBadges(); };
  });
  wireMeasurementHelp(p);
  updateBadges();
}
function measRow(k, optional){
  const lbl=MEAS_LABELS[k]||prettify(k);
  const helpText=DATA.measureHelp[k.toLowerCase()];
  const help=helpText?' <button type="button" class="info" aria-label="How to measure '+esc(lbl)+'" aria-expanded="false" data-help="'+esc(helpText.replace(/\s+/g,' ').slice(0,300))+'">?</button>':'';
  const val=state.measurements[k]>0?fmt(mmToDisplay(state.measurements[k])):'';
  return '<div class="row"><label>'+esc(lbl)+help+'</label>'+
    '<input class="num'+(optional?' opt':'')+'" data-meas="'+k+'" type="number" step="0.125" value="'+val+'" placeholder="'+(optional?'—':'0')+'"><span class="unit">'+unitLabel()+'</span></div>';
}

let pinnedHelp=null;
function closeMeasurementHelp(){
  if(pinnedHelp) pinnedHelp.setAttribute('aria-expanded','false');
  pinnedHelp=null; $('helpPopover').hidden=true;
}
function showMeasurementHelp(button, pin){
  const pop=$('helpPopover');
  if(pinnedHelp && pinnedHelp!==button) pinnedHelp.setAttribute('aria-expanded','false');
  if(pin){ pinnedHelp=button; button.setAttribute('aria-expanded','true'); }
  pop.textContent=button.dataset.help; pop.hidden=false;
  const r=button.getBoundingClientRect();
  const left=Math.min(window.innerWidth-pop.offsetWidth-10, Math.max(10,r.left-pop.offsetWidth+18));
  const top=Math.min(window.innerHeight-pop.offsetHeight-10, r.bottom+7);
  pop.style.left=left+'px'; pop.style.top=top+'px';
}
function wireMeasurementHelp(root){
  root.querySelectorAll('.info[data-help]').forEach(button=>{
    button.onmouseenter=()=>showMeasurementHelp(button,false);
    button.onmouseleave=()=>{ if(pinnedHelp!==button) $('helpPopover').hidden=true; };
    button.onfocus=()=>showMeasurementHelp(button,false);
    button.onblur=()=>{ if(pinnedHelp!==button) $('helpPopover').hidden=true; };
    button.onclick=(event)=>{
      event.preventDefault(); event.stopPropagation();
      if(pinnedHelp===button) closeMeasurementHelp();
      else showMeasurementHelp(button,true);
    };
  });
}
document.addEventListener('click',closeMeasurementHelp);
document.addEventListener('keydown',event=>{ if(event.key==='Escape') closeMeasurementHelp(); });

/* ═════════════ options tab ═════════════ */
function buildOptions(){
  const cfg=getConfig(state.design);
  const p=$('page-opts');
  const groups={};
  Object.entries(cfg.options||{}).forEach(([key,v])=>{
    const kind=optionKind(v); if(!kind) return;
    const g=optionGroup(v); if(g===null) return;
    (groups[g]=groups[g]||[]).push({key,v,kind});
  });
  const gk=Object.keys(groups).sort((a,b)=>{
    const ord=['fit','style','advanced']; const ia=ord.indexOf(a),ib=ord.indexOf(b);
    return (ia<0?50:ia)-(ib<0?50:ib) || a.localeCompare(b);
  });
  if(!gk.length){ p.innerHTML='<div style="padding:20px;color:var(--text-dim);font-size:12px;text-align:center;line-height:1.6">This pattern has no adjustable options — the shape comes straight from the measurements.</div>'; updateBadges(); return; }
  let html='';
  gk.forEach(g=>{
    const gl=(GROUP_LABELS[g]||prettify(g));
    html+='<div class="fieldset-title">'+esc(gl)+' <button class="oreset grp-reset" data-grp="'+g+'">reset group</button></div>';
    groups[g].forEach(o=>{ html+=optionWidget(o.key,o.v,o.kind); });
  });
  p.innerHTML=html;
  // wire widgets
  p.querySelectorAll('[data-opt]').forEach(el=>{
    const key=el.dataset.opt, kind=el.dataset.kind;
    const handler=()=>{
      let val;
      if(kind==='pct') val=parseFloat(el.value)/100;
      else if(kind==='deg'||kind==='count') val=parseFloat(el.value);
      else if(kind==='bool') val=el.checked;
      else val=el.value;
      state.options[state.design]=state.options[state.design]||{};
      state.options[state.design][key]=val;
      updateOptionReadout(key,kind,el);
      draft(); saveState(); updateBadges();
    };
    el.addEventListener(kind==='list'||kind==='bool'?'change':'input',handler);
  });
  p.querySelectorAll('.oreset[data-key]').forEach(b=>b.onclick=()=>{ if(state.options[state.design]){ delete state.options[state.design][b.dataset.key]; } buildOptions(); draft(); saveState(); updateBadges(); });
  p.querySelectorAll('.grp-reset').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); const g=b.dataset.grp; const cfg2=getConfig(state.design); Object.entries(cfg2.options||{}).forEach(([k,v])=>{ if(optionKind(v)&&optionGroup(v)===g&&state.options[state.design]) delete state.options[state.design][k]; }); buildOptions(); draft(); saveState(); updateBadges(); });
  updateBadges();
}
function optCurrent(key,v,kind){
  const ov=(state.options[state.design]||{})[key];
  const isSet = ov!==undefined;
  let disp;
  if(kind==='pct') disp = isSet? Math.round(ov*1000)/10 : v.pct;
  else if(kind==='deg') disp = isSet? ov : v.deg;
  else if(kind==='count') disp = isSet? ov : v.count;
  else if(kind==='bool') disp = isSet? ov : (key==='helpText'?true:v.bool);
  else disp = isSet? ov : v.dflt;
  return {disp,isSet};
}
function optionWidget(key,v,kind){
  const {t,d}=optLabel(state.design,key);
  const {disp,isSet}=optCurrent(key,v,kind);
  const reset = isSet? ' <button class="oreset" data-key="'+key+'">reset</button>':'';
  const desc = d? '<div class="odesc">'+esc(d)+'</div>':'';
  if(kind==='bool'){
    return '<div class="opt bool"><div class="ohead"><span class="oname">'+esc(t)+reset+'</span>'+
      '<label class="switch"><input type="checkbox" data-opt="'+key+'" data-kind="bool"'+(disp?' checked':'')+'><span class="sl"></span></label></div>'+desc+'</div>';
  }
  if(kind==='list'){
    const opts=v.list.map(o=>'<option value="'+esc(o)+'"'+(o===disp?' selected':'')+'>'+esc(prettify(String(o)))+'</option>').join('');
    return '<div class="opt"><div class="ohead"><span class="oname">'+esc(t)+reset+'</span></div>'+
      '<select class="sel" data-opt="'+key+'" data-kind="list">'+opts+'</select>'+desc+'</div>';
  }
  let min,max,step,val,suffix;
  if(kind==='pct'){ min=v.min; max=v.max; step=(max-min)<=6?0.1:1; val=disp; suffix='%'; }
  else if(kind==='deg'){ min=v.min; max=v.max; step=1; val=disp; suffix='°'; }
  else { min=v.min; max=v.max; step=1; val=disp; suffix=''; }
  return '<div class="opt"><div class="ohead"><span class="oname">'+esc(t)+reset+'</span>'+
    '<span class="oval'+(isSet?'':' def')+'" data-readout="'+key+'">'+val+suffix+'</span></div>'+
    '<input type="range" data-opt="'+key+'" data-kind="'+kind+'" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'">'+desc+'</div>';
}
function updateOptionReadout(key,kind,el){
  const r=el.parentElement.parentElement.querySelector('[data-readout="'+key+'"]');
  if(!r) return;
  const suffix = kind==='pct'?'%':(kind==='deg'?'°':'');
  r.textContent=el.value+suffix; r.classList.remove('def');
}

/* ═════════════ guide tab ═════════════ */
function mdToHtml(md){
  const lines=md.split('\n'); let html='', inList=false, para=[];
  const inline=(s)=>esc(s).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/(^|[^\w])_([^_]+)_/g,'$1<em>$2</em>').replace(/`([^`]+)`/g,'<code>$1</code>');
  const flushP=()=>{ if(para.length){ html+='<p>'+inline(para.join(' '))+'</p>'; para=[]; } };
  const flushL=()=>{ if(inList){ html+='</ul>'; inList=false; } };
  lines.forEach(raw=>{
    const line=raw.trimEnd();
    if(!line.trim()){ flushP(); flushL(); return; }
    let m;
    if((m=line.match(/^###\s+(.*)/))){ flushP(); flushL(); html+='<h3>'+inline(m[1])+'</h3>'; }
    else if((m=line.match(/^##\s+(.*)/))){ flushP(); flushL(); html+='<h2>'+inline(m[1])+'</h2>'; }
    else if((m=line.match(/^#\s+(.*)/))){ flushP(); flushL(); html+='<h2>'+inline(m[1])+'</h2>'; }
    else if((m=line.match(/^>\s?(.*)/))){ flushP(); flushL(); html+='<blockquote>'+inline(m[1])+'</blockquote>'; }
    else if((m=line.match(/^[-*]\s+(.*)/))){ flushP(); if(!inList){ html+='<ul>'; inList=true; } html+='<li>'+inline(m[1])+'</li>'; }
    else { flushL(); para.push(line.trim()); }
  });
  flushP(); flushL();
  return html;
}
/* Remove FreeSewing brand names / URLs from the bundled instruction prose. */
function scrubBrand(md){
  return (md||'')
    .replace(/\s*\(https?:\/\/[^)]*free ?sewing[^)]*\)/gi,'')
    .replace(/https?:\/\/\S*free ?sewing\S*/gi,'')
    .replace(/free ?sewing\.(org|eu|dev)/gi,'')
    .replace(/\bfree ?sewing\s+(pattern|design)\b/gi,'$1')
    .replace(/\bfree ?sewing\b/gi,'this pattern library');
}
function buildGuide(){
  const a=ABOUT[state.design], p=$('page-guide');
  let dots=''; for(let i=1;i<=5;i++) dots+='<i class="'+(i<=(a.difficulty||0)?'f':'')+'"></i>';
  let html='<div style="font-size:15px;font-weight:700;color:#eef1f6;margin-bottom:3px">'+esc(a.name)+'</div>';
  html+='<div style="font-size:12px;color:var(--text-dim);line-height:1.55;margin-bottom:11px">'+esc(scrubBrand(a.description))+'</div>';
  html+='<figure class="guide-illustration"><img loading="lazy" src="illustrations/'+encodeURIComponent(state.design)+'.svg" alt="'+esc(a.name)+' design line drawing"><figcaption>Design line drawing</figcaption></figure>';
  html+='<div class="guide-meta">';
  html+='<span class="chip diff">Difficulty <span class="diff" style="margin-left:3px">'+dots+'</span></span>';
  (a.techniques||[]).forEach(t=>html+='<span class="chip">'+esc(prettify(t))+'</span>');
  html+='</div>';
  const instr=DATA.instructions[state.design];
  if(instr){ html+='<div class="fieldset-title">Sewing instructions</div><div class="md">'+mdToHtml(scrubBrand(instr))+'</div>'; }
  else { html+='<div style="font-size:12px;color:var(--text-dim);line-height:1.6">Draft &amp; print this pattern, then cut it out and pin it to your fabric. Written step-by-step instructions aren\'t included for this design.</div>'; }
  p.innerHTML=html;
  const drawing=p.querySelector('.guide-illustration img');
  drawing.onerror=()=>drawing.closest('.guide-illustration').remove();
}

function updateBadges(){
  const miss=missingMeasurements(state.design).length;
  $('measBadge').textContent = miss? '·'+miss+' left' : '';
  $('measBadge').style.color = miss? 'var(--amber)':'';
  const nOpt=Object.keys((state.options[state.design]||{})).length;
  $('optBadge').textContent = nOpt? nOpt+'✎' : '';
}

/* ═════════════ tabs ═════════════ */
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t));
  document.querySelectorAll('.tabpage').forEach(x=>x.classList.remove('on'));
  $('page-'+t.dataset.tab).classList.add('on');
});

function setAdvancedMode(enabled){
  state.advanced=!!enabled;
  const button=$('btnAdvanced'), tab=$('tabOpts');
  button.setAttribute('aria-pressed',String(state.advanced));
  button.textContent=state.advanced?'✓ Advanced mode':'⚙ Advanced mode';
  button.title=state.advanced?'Hide design options':'Show design options to fine-tune the fit';
  tab.hidden=!state.advanced;
  if(!state.advanced && tab.classList.contains('on')) document.querySelector('.tab[data-tab="meas"]').click();
}
$('btnAdvanced').onclick=()=>setAdvancedMode(!state.advanced);

/* ═════════════ printing ═════════════ */
const CAL_MM = 100;   // calibration square = 100 mm (10 cm ≈ 3.94 in)
function calibrationHTML(){
  return '<div style="border:1.5px solid #000;width:'+CAL_MM+'mm;height:'+CAL_MM+'mm;box-sizing:border-box;display:flex;align-items:center;justify-content:center;text-align:center;font:600 3.2mm/1.35 Arial;page-break-inside:avoid">'+
    'Test square<br>should measure<br><b>10&nbsp;cm</b> / <b>3.94&nbsp;in</b><br><span style="font-weight:400;font-size:2.6mm;color:#444">If not, set your printer to<br>100% / “Actual size”.</span></div>';
}
function scaleBarHTML(){
  return '<div style="display:flex;align-items:center;gap:2mm;font:400 2.6mm Arial;color:#333"><div style="width:50mm;height:3mm;border:0.4mm solid #000;border-top:none"></div><span>50&nbsp;mm (5&nbsp;cm)</span></div>';
}
function openPrint(title, bodyHTML, pageCss){
  const w=window.open('','_blank');
  if(!w){ toast('Pop-up blocked — allow pop-ups to print.', true); return; }
  w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>'+esc(title)+'</title><style>'+
    '*{box-sizing:border-box}html,body{margin:0;padding:0;background:#fff;color:#000;font-family:Arial,sans-serif}'+
    'svg{display:block}'+pageCss+
    '.noprint{background:#111;color:#fff;padding:10px 14px;font:13px Arial;position:sticky;top:0;display:flex;gap:10px;align-items:center}'+
    '.noprint button{background:#EC008C;color:#fff;border:none;border-radius:6px;padding:7px 14px;font:600 13px Arial;cursor:pointer}'+
    '.noprint span{opacity:.8}'+
    '@media print{.noprint{display:none}}'+
    '</style></head><body>'+
    '<div class="noprint"><button onclick="window.print()">🖨 Print</button><span>'+esc(title)+' — check the test square measures correctly, then print at 100% scale.</span></div>'+
    bodyHTML+'</body></html>');
  w.document.close();
}
function currentPrintSVG(){
  if(!curSVG){ toast('Draft a pattern first.', true); return null; }
  return {svg:stripXml(curSVG), W:curW, H:curH};
}
/* 36" roll: one continuous page, 36" wide, centred, true scale. Auto-rotates. */
function printRoll(){
  const P=currentPrintSVG(); if(!P) return;
  let {svg,W,H}=P;
  let rot=false;
  if(W>ROLL_W_MM && H<=ROLL_W_MM){ rot=true; const t=W; W=H; H=t; }
  const over = W>ROLL_W_MM;
  const pageH=H+40;   // 20mm margin top/bottom
  const svgBox='<div style="width:'+P.W+'mm;height:'+P.H+'mm;'+(rot?'transform:rotate(90deg);transform-origin:top left;position:relative;left:'+P.H+'mm;':'')+'">'+
    svg.replace('<svg','<svg width="'+P.W+'mm" height="'+P.H+'mm"')+'</div>';
  const body='<div style="width:'+ROLL_W_MM+'mm;min-height:'+pageH+'mm;padding:20mm 0;position:relative">'+
    (over?'<div style="color:#b00;font:600 4mm Arial;text-align:center;margin-bottom:6mm">⚠ This pattern is wider than 36″. Print Letter tiles instead, or trim/rotate.</div>':'')+
    '<div style="position:absolute;top:8mm;left:8mm">'+calibrationHTML()+'</div>'+
    '<div style="display:flex;justify-content:center">'+svgBox+'</div>'+
    '</div>';
  openPrint(ABOUT[state.design].name+' — 36″ roll', body,
    '@page{size:'+ROLL_W_MM+'mm '+pageH+'mm;margin:0}');
}
/* US Letter tiles: window the true-scale SVG across pages with overlap + marks. */
function printTiles(){
  const P=currentPrintSVG(); if(!P) return;
  const {svg,W,H}=P;
  const MARGIN=8, OVER=10;                    // mm: page margin + tile overlap
  const tileW=LETTER_W-MARGIN*2, tileH=LETTER_H-MARGIN*2;
  const stepX=tileW-OVER, stepY=tileH-OVER;
  const cols=Math.max(1,Math.ceil((W-OVER)/stepX)), rows=Math.max(1,Math.ceil((H-OVER)/stepY));
  const svgSized=svg.replace('<svg','<svg width="'+W+'mm" height="'+H+'mm"');
  // assembly / cover page
  let body='<div class="page cover">'+
    '<h1 style="font:700 7mm Arial;margin:0 0 2mm">'+esc(ABOUT[state.design].name)+'</h1>'+
    '<div style="font:400 3.4mm Arial;color:#333;margin-bottom:5mm">Made-to-measure · '+rows+' × '+cols+' pages ('+(rows*cols)+' total). Print at 100% / “Actual size”, then trim on the dashed line and tape columns left-to-right, rows top-to-bottom.</div>'+
    '<div style="display:flex;gap:8mm;align-items:flex-start;flex-wrap:wrap">'+calibrationHTML()+
      '<div><div style="font:600 3.2mm Arial;margin-bottom:2mm">Assembly map</div>'+assemblyMap(rows,cols)+'<div style="margin-top:3mm">'+scaleBarHTML()+'</div></div>'+
    '</div></div>';
  // tile pages
  for(let r=0;r<rows;r++){ for(let c=0;c<cols;c++){
    const offX=c*stepX, offY=r*stepY;
    body+='<div class="page tile">'+
      '<div class="win" style="width:'+tileW+'mm;height:'+tileH+'mm">'+
        '<div class="mv" style="left:'+(-offX)+'mm;top:'+(-offY)+'mm;width:'+W+'mm;height:'+H+'mm">'+svgSized+'</div>'+
        cropMarks()+
      '</div>'+
      '<div class="lbl">'+esc(ABOUT[state.design].name)+' · row '+(r+1)+' / col '+(c+1)+'  ('+(r*cols+c+1)+' of '+(rows*cols)+')</div>'+
    '</div>';
  }}
  const css='@page{size:letter;margin:0}'+
    '.page{width:'+LETTER_W+'mm;height:'+LETTER_H+'mm;padding:'+MARGIN+'mm;position:relative;overflow:hidden;page-break-after:always}'+
    '.page.cover{padding:14mm}'+
    '.win{position:relative;overflow:hidden;outline:0.3mm dashed #999}'+
    '.mv{position:absolute}.mv svg{position:absolute;left:0;top:0}'+
    '.lbl{position:absolute;left:'+MARGIN+'mm;bottom:2mm;font:400 2.7mm Arial;color:#555}'+
    '.cm{position:absolute;width:4mm;height:4mm;border:0.3mm solid #000}'+
    '.cm.tl{left:-0.15mm;top:-0.15mm;border-right:none;border-bottom:none}'+
    '.cm.tr{right:-0.15mm;top:-0.15mm;border-left:none;border-bottom:none}'+
    '.cm.bl{left:-0.15mm;bottom:-0.15mm;border-right:none;border-top:none}'+
    '.cm.br{right:-0.15mm;bottom:-0.15mm;border-left:none;border-top:none}';
  openPrint(ABOUT[state.design].name+' — Letter tiles', body, css);
}
function cropMarks(){ return '<div class="cm tl"></div><div class="cm tr"></div><div class="cm bl"></div><div class="cm br"></div>'; }
function assemblyMap(rows,cols){
  let h='<table style="border-collapse:collapse">';
  for(let r=0;r<rows;r++){ h+='<tr>'; for(let c=0;c<cols;c++){ h+='<td style="width:9mm;height:9mm;border:0.3mm solid #333;text-align:center;font:600 3mm Arial;color:#333">'+(r*cols+c+1)+'</td>'; } h+='</tr>'; }
  return h+'</table>';
}
$('btnRoll').onclick=printRoll;
$('btnTiles').onclick=printTiles;

/* ═════════════ sharing ═════════════ */
$('btnShare').onclick=()=>{
  const url=location.origin+location.pathname+'#'+encodeShare();
  navigator.clipboard.writeText(url).then(()=>toast('Link copied — it reopens this pattern with these measurements.'),
    ()=>{ prompt('Copy this link:', url); });
};

/* Glossary of sewing / pattern-drafting terms. */
SDSCPA.attachGlossary({ labName:'Pattern Lab', goal:'I can take body measurements and draft a pattern I can cut and sew.',
  terms:[
    ['Made-to-measure','A pattern drafted to one person\'s exact body measurements, instead of a fixed standard size.'],
    ['Block / Sloper','A basic fitted pattern with no style details, used as the starting point for other designs.'],
    ['Ease','Extra room added beyond the body measurement so the garment fits and moves. “Positive ease” is looser; negative ease (in stretch fabric) is tighter.'],
    ['Seam allowance','The strip of fabric between the stitching line and the cut edge — here you set it on/off and how wide.'],
    ['Grainline','The arrow on a pattern piece that you line up with the fabric\'s lengthwise grain before cutting.'],
    ['Notch','A small mark on the edge of a pattern piece used to match one piece to another when sewing.'],
    ['Dart','A folded, stitched wedge that shapes flat fabric around a curve of the body (bust, waist, hip).'],
    ['Muslin / Toile','A test garment sewn in cheap fabric to check the fit before cutting the real cloth.'],
    ['HPS','“High point shoulder” — the top of the shoulder at the neck, a reference point many measurements start from.'],
    ['Bust span','The distance between the two bust points; used to place bust darts.'],
    ['Sleevecap','The curved top of a sleeve that eases into the armhole.'],
    ['Hem','The finished bottom edge of a garment, usually folded up and stitched.'],
    ['Selvedge','The tightly-woven finished edge running down each side of the fabric, parallel to the grain.'],
    ['1:1 / Actual size','Printing with no scaling so the pattern comes out at true body size — check the test square.']
  ]});

/* ═════════════ init ═════════════ */
function init(){
  if(!window.FS || !FS.designs){ document.body.innerHTML='<div style="padding:40px;font-family:sans-serif;color:#f0f0f0">Pattern engine failed to load. Make sure <code>freesewing.bundle.js</code> is present.</div>'; return; }
  loadState();
  tryLoadShare();
  if(!DESIGNS[state.design]) state.design='teagan';
  if(!DESIGNS[state.design]) state.design=Object.keys(DESIGNS)[0];
  // seed measurements from the sample body if none saved
  if(!state.measurements || !Object.keys(state.measurements).length){
    state.measurements = Object.assign({}, FS.models[state.sampleSize] || FS.models.cisFemaleAdult36);
  }
  buildPicker('');
  $('pkSearch').oninput=()=>buildPicker();
  $('pkDifficulty').value=String(state.diffFilter);
  $('pkDifficulty').onchange=(event)=>{ state.diffFilter=Number(event.target.value)||0; buildPicker(); };
  setAdvancedMode(false);
  selectDesign(state.design);
  window.addEventListener('resize', ()=>{ if(curW) applyView(); });
}
init();
